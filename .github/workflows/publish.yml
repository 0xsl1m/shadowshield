name: Publish to PyPI

# Publishes via PyPI Trusted Publishing (OIDC) — NO API token is stored anywhere.
# Fires when a GitHub Release is published, or on manual dispatch.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/*

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # REQUIRED for trusted publishing (OIDC); no secrets used
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses the repo's trusted-publisher config on PyPI — see docs/RELEASING.md.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast feedback: lint, type-check, and the full test suite WITHOUT the heavy ML
  # stack. Model-backed tests skip themselves when transformers/sentence-transformers
  # aren't installed, so this job is quick (seconds, not minutes) and gates PRs.
  core:
    name: core (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (no heavy ML deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,langchain,datasets]"
      - name: Lint
        run: ruff check src tests
      - name: Format check
        run: ruff format --check src tests
      - name: Type-check
        run: mypy src/shadowshield
      - name: Test
        run: pytest --cov=shadowshield --cov-report=term-missing

  # Heavy: exercise the optional ML classifier + vector-similarity layers against
  # real models. Separate job so a slow model download never blocks PR feedback.
  ml:
    name: ml-integration
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (with transformers + vectors)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,transformers,vectors,datasets]"
      - name: Run model-backed tests (real models)
        env:
          SHADOWSHIELD_RUN_MODEL_TESTS: "1"
        run: pytest -m integration tests/test_transformer.py tests/test_vector.py

  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check metadata
        run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
